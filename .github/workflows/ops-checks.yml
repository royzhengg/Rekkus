name: Ops Checks

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 2 * * *'
    - cron: '29 3 * * 1'
    - cron: '41 4 1 * *'
    - cron: '53 5 1 1,4,7,10 *'

jobs:
  ops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Schema drift
        run: npm run check:schema-drift

      - name: Type alias drift
        run: |
          set -euo pipefail
          node scripts/gen-db-aliases.js
          git diff --exit-code types/database.aliases.ts || \
            (echo "types/database.aliases.ts is out of date — run npm run typegen:supabase:local" && exit 1)

      - name: Hygiene
        run: npm run check:hygiene

      - name: Dead-code candidates
        run: npm run check:dead-code

      - name: Stale feature flags
        run: npm run check:stale-flags

      - name: Release readiness
        if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
        run: npm run check:release

      - name: Dependency audit
        if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
        run: npm run check:deps

      - name: Write ops summary
        if: always()
        run: npm run ops:report

      - name: Upload ops summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-summary
          path: .temp/ops
